<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Veritas AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #0f172a, #1e1b4b); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; perspective: 1000px; overflow: hidden; }
        
        /* 3D Container */
        .card-container { transform-style: preserve-3d; transition: transform 0.1s; }
        
        .card { 
            background: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(20px);
            padding: 3rem; 
            border-radius: 25px; 
            width: 100%; max-width: 400px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            transform: rotateX(10deg);
            transition: 0.5s;
        }
        
        .card:hover { transform: rotateX(0deg) translateY(-10px); border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 40px rgba(59, 130, 246, 0.2); }
        
        h2 { margin-bottom: 2rem; font-size: 2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        
        input { width: 100%; padding: 15px; margin-bottom: 1.5rem; background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; color: white; border-radius: 12px; box-sizing: border-box; font-family: inherit; transition: 0.3s; }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        
        button { width: 100%; padding: 15px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        button:hover { transform: scale(1.05); }
        
        .links { margin-top: 1.5rem; font-size: 0.9rem; color: #94a3b8; }
        .links a { color: #3b82f6; text-decoration: none; font-weight: 600; }
        .error { color: #ef4444; margin-bottom: 1.5rem; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card">
            <i class="fas fa-user-circle" style="font-size: 3rem; color: #3b82f6; margin-bottom: 20px;"></i>
            <h2>Login</h2>
            {% with messages = get_flashed_messages() %}
              {% if messages %} {% for message in messages %} <p class="error">{{ message }}</p> {% endfor %} {% endif %}
            {% endwith %}
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <div class="links">
                New here? <a href="/register">Create account</a> <br><br>
                <a href="/welcome" style="color: #64748b; font-size: 0.8rem;">&larr; Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
