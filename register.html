<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Veritas AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #0f172a, #1e1b4b); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; perspective: 1000px; overflow: hidden; }
        
        .card { 
            background: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(20px);
            padding: 3rem; 
            border-radius: 25px; 
            width: 100%; max-width: 400px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            transform: rotateX(10deg);
            transition: 0.5s;
        }
        
        .card:hover { transform: rotateX(0deg) translateY(-10px); border-color: rgba(16, 185, 129, 0.5); box-shadow: 0 0 40px rgba(16, 185, 129, 0.2); }
        
        h2 { margin-bottom: 2rem; font-size: 2rem; }
        
        input { width: 100%; padding: 15px; margin-bottom: 1.5rem; background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; color: white; border-radius: 12px; box-sizing: border-box; font-family: inherit; transition: 0.3s; }
        input:focus { outline: none; border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        
        button { width: 100%; padding: 15px; background: linear-gradient(90deg, #10b981, #059669); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        button:hover { transform: scale(1.05); }
        
        .links { margin-top: 1.5rem; font-size: 0.9rem; color: #94a3b8; }
        .links a { color: #10b981; text-decoration: none; font-weight: 600; }
        .error { color: #ef4444; margin-bottom: 1rem; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px; }
        .success { color: #10b981; margin-bottom: 1rem; background: rgba(16, 185, 129, 0.1); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <i class="fas fa-user-plus" style="font-size: 3rem; color: #10b981; margin-bottom: 20px;"></i>
        <h2>Create Account</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %} {% for category, message in messages %} <p class="{{ category }}">{{ message }}</p> {% endfor %} {% endif %}
        {% endwith %}
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
        <div class="links">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</body>
</html>
