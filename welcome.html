<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome | Veritas AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --secondary: #ec4899; --accent: #06b6d4; --bg-deep: #0f172a; }
        
        body { 
            font-family: 'Outfit', sans-serif; margin: 0; overflow: hidden; 
            /* Colorful Gradient Background */
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* Animated Color Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: floatBlob 10s infinite alternate;
        }
        .blob-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; }
        .blob-2 { width: 300px; height: 300px; background: var(--secondary); bottom: -50px; right: -50px; animation-delay: 2s; }
        .blob-3 { width: 200px; height: 200px; background: var(--accent); top: 40%; left: 60%; animation-delay: 4s; }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* 3D Hero Card */
        .hero-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 4.5rem;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            width: 90%;
            z-index: 10;
            transform-style: preserve-3d;
            animation: cardFloat 6s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0) rotateX(2deg); }
            50% { transform: translateY(-15px) rotateX(0deg); }
        }

        .icon-circle {
            width: 120px; height: 120px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 2.5rem auto;
            font-size: 3.5rem;
            box-shadow: 0 0 60px rgba(6, 182, 212, 0.4);
            transform: translateZ(60px);
            animation: iconPulse 3s infinite;
        }

        @keyframes iconPulse {
            0% { box-shadow: 0 0 30px rgba(6, 182, 212, 0.4); }
            50% { box-shadow: 0 0 60px rgba(236, 72, 153, 0.6); }
            100% { box-shadow: 0 0 30px rgba(6, 182, 212, 0.4); }
        }

        h1 {
            font-size: 3.8rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(40px);
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #e2e8f0;
            margin-bottom: 3.5rem;
            transform: translateZ(20px);
            line-height: 1.6;
        }

        .btn-gradient {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            background-size: 200% auto;
            color: white;
            padding: 22px 60px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            transition: 0.5s;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            display: inline-block;
            transform: translateZ(50px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-gradient:hover {
            background-position: right center;
            transform: translateZ(70px) scale(1.05);
            box-shadow: 0 20px 40px rgba(236, 72, 153, 0.6);
        }

        /* Particles */
        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 0; pointer-events: none; }
        .particle { position: absolute; width: 4px; height: 4px; background: white; border-radius: 50%; opacity: 0.5; animation: rise 10s infinite ease-in; }
        @keyframes rise { 0% { transform: translateY(100vh); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-10vh); opacity: 0; } }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .hero-card { padding: 2rem; }
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="particles" id="particles"></div>

    <div class="hero-card">
        <div class="icon-circle">
            <i class="fas fa-shield-halved" style="color: white;"></i>
        </div>
        
        <h1>Multi Language<br>Fake News Detector</h1>
        
        <p class="subtitle">
            Experience the next generation of AI-powered fact-checking. 
            <br>Accurate. Fast. Multilingual.
        </p>
        
        <a href="{{ url_for('login') }}" class="btn-gradient">
            Get Started <i class="fas fa-arrow-right" style="margin-left: 10px;"></i>
        </a>
    </div>

    <script>
        // Generate rising particles
        const particlesContainer = document.getElementById('particles');
        for(let i = 0; i < 50; i++) {
            const div = document.createElement('div');
            div.classList.add('particle');
            div.style.left = `${Math.random() * 100}%`;
            div.style.animationDuration = `${Math.random() * 10 + 5}s`;
            div.style.animationDelay = `${Math.random() * 5}s`;
            particlesContainer.appendChild(div);
        }
    </script>

</body>
</html>
